name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

      - uses: actions/upload-artifact@v4
        if: github.event_name == 'pull_request'
        with:
          name: dist-${{ github.event.pull_request.number }}
          path: dist/
          retention-days: 7
